packages:
  - playground

catalogs:
  build:
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vite-plus: ^0.2.0
  dev:
    '@builder.io/qwik': ^1.20.0
    gsap: ^3.15.0
    playwright: ^1.60.0
    vitest: npm:@voidzero-dev/vite-plus-test@latest
    vitest-browser-qwik: 0.3.8
  types:
    '@types/node': '^26.0.0'
    '@typescript/native-preview': 7.0.0-dev.20260705.1
    typescript: ^6.0.3
  scripts:
    bumpp: ^11.1.0

overrides:
  vite: 'catalog:build'
  vitest: 'catalog:dev'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
