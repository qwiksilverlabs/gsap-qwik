packages:
  - playground

catalogs:
  build:
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vite-plus: ^0.1.22
  dev:
    '@builder.io/qwik': ^1.19.2
    gsap: ^3.15.0
    playwright: ^1.60.0
    vitest: npm:@voidzero-dev/vite-plus-test@latest
    vitest-browser-qwik: 0.1.0
  types:
    '@types/node': '^25.9.1'
    '@typescript/native-preview': 7.0.0-dev.20260509.2
    typescript: ^6.0.3
  scripts:
    bumpp: ^11.1.0
    taze: ^19.13.0

minimumReleaseAgeExclude:
  - actionspack@0.1.5

overrides:
  vite: 'catalog:build'
  vitest: 'catalog:dev'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
