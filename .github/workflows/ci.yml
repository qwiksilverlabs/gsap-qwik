# This file is generated by actionspack. Do not edit it manually.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: voidzero-dev/setup-vp@9446e853b27985e00fb1b21193be026fc09198db
        with:
          node-version: lts/*
          cache: true

      - run: vp install

      - run: vp pack

      - run: vp check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node:
          - lts/*
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: voidzero-dev/setup-vp@9446e853b27985e00fb1b21193be026fc09198db
        with:
          node-version: lts/*
          cache: true

      - run: vp install

      - name: Install Playwright Browsers
        run: vpx playwright install --with-deps

      - run: vp pack

      - run: vp check

      - run: vpr test:ci
